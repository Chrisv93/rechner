<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Generator PRO</title>

<style>
body{font-family:Arial;background:#f4f6f9;text-align:center;padding:40px;}
button{
 padding:16px 28px;
 font-size:18px;
 border:none;
 border-radius:8px;
 background:#16a34a;
 color:#fff;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>SEO Seiten Generator PRO</h1>
<button onclick="generate()">Seiten erstellen</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

// Netto Berechnung
function netto(b){
 if(b<=2000)return Math.round(b*0.74/50)*50;
 if(b<=3000)return Math.round(b*0.72/50)*50;
 if(b<=4000)return Math.round(b*0.70/50)*50;
 if(b<=5000)return Math.round(b*0.68/50)*50;
 if(b<=7000)return Math.round(b*0.66/50)*50;
 return Math.round(b*0.64/50)*50;
}

// Template
function layout(title, desc, content){
 return `
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title}</title>
<meta name="description" content="${desc}">
<meta name="robots" content="index, follow">

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
.wrapper{max-width:960px;margin:40px auto;padding:0 20px;}
.card{background:#fff;border-radius:14px;padding:30px;box-shadow:0 6px 24px rgba(0,0,0,0.06);}
h1{text-align:center;}
.result{text-align:center;font-size:28px;font-weight:bold;margin:20px 0;}
.text{text-align:center;color:#4b5563;max-width:700px;margin:0 auto;}
.cta{background:#eef4ff;padding:25px;border-radius:12px;text-align:center;margin:30px 0;border:1px solid #d8e5ff;}
.button{display:inline-block;padding:16px 26px;background:#16a34a;color:#fff;text-decoration:none;border-radius:10px;font-weight:bold;font-size:18px;margin-top:12px;}
.section{margin-top:35px;}
.section h2{text-align:center;}
.section p{max-width:700px;margin:10px auto;color:#4b5563;line-height:1.6;text-align:center;}
ul{text-align:center;list-style-position:inside;line-height:2;}
</style>

</head>
<body>

<div class="wrapper">
<div class="card">

${content}

</div>
</div>

</body>
</html>`;
}

// 🔥 STARKES TEMPLATE
function page(v){

 let n = netto(v);

 let texte1 = [
  `Bei ${v}€ brutto bleiben dir ungefähr ${n}€ netto im Monat.`,
  `Aus einem Gehalt von ${v}€ brutto ergeben sich etwa ${n}€ netto.`,
  `Mit ${v}€ brutto kannst du ungefähr ${n}€ netto erwarten.`
 ];

 let texte2 = [
  `Der genaue Betrag hängt stark von Steuerklasse, Krankenversicherung und Bundesland ab.`,
  `Wie viel du wirklich bekommst, hängt von deinen Abzügen und deiner Steuerklasse ab.`,
  `Unterschiede entstehen vor allem durch Steuerklasse und Sozialabgaben.`
 ];

 let t1 = texte1[v % texte1.length];
 let t2 = texte2[v % texte2.length];

 let content = `
<h1>${v}€ brutto → netto</h1>

<div class="result">≈ ${n}€ netto</div>

<p class="text">${t1} ${t2}</p>

<div class="cta">
<h2>Mehr Netto behalten</h2>
<p class="text">
Viele sparen mehrere hundert Euro im Jahr bei Strom, Versicherungen oder Verträgen.
</p>

<a href="https://www.check24.de" target="_blank" class="button">
Bis zu 500€ sparen → jetzt prüfen
</a>
</div>

<div class="section">
<h2>Wie setzt sich dein Netto zusammen?</h2>
<p>
Dein Netto ergibt sich aus Lohnsteuer, Krankenversicherung, Rentenversicherung und weiteren Abzügen.
Gerade bei ${v}€ brutto können sich hier deutliche Unterschiede ergeben.
</p>
</div>

<div class="section">
<h2>Ist ${v}€ brutto ein gutes Gehalt?</h2>
<p>
Das Gehalt liegt im mittleren bis gehobenen Bereich. Wie viel dir bleibt, hängt stark davon ab,
wie du deine laufenden Kosten optimierst.
</p>
</div>

<div class="section">
<h2>Ähnliche Gehälter</h2>
<ul>
<li><a href="netto-${v-500}-brutto.html">${v-500}€ brutto</a></li>
<li><a href="netto-${v-300}-brutto.html">${v-300}€ brutto</a></li>
<li><a href="netto-${v+300}-brutto.html">${v+300}€ brutto</a></li>
<li><a href="netto-${v+500}-brutto.html">${v+500}€ brutto</a></li>
</ul>
</div>

<p style="text-align:center;">
<a href="index.html">Zurück zur Übersicht</a>
</p>
`;

 return layout(
  `${v}€ brutto netto 2026 – wie viel bleibt dir wirklich?`,
  `Wie viel netto bei ${v}€ brutto? Jetzt schnell berechnen und Einsparpotenzial entdecken.`,
  content
 );
}

// GENERATOR
function generate(){

 let zip = new JSZip();

 for(let v=2000; v<=7000; v+=500){
  zip.file(`netto-${v}-brutto.html`, page(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="seo-starke-seiten.zip";
  a.click();
 });

}

</script>

</body>
</html>
