<script>
function generate() {
    for(let i = 1000; i <= 10000; i += 50) {
        let netto = Math.round(i * 0.7);

        let content = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Netto bei ${i} Brutto Deutschland</title>
</head>
<body>

<h1>Netto bei ${i}€ Brutto</h1>

<p>Wenn du ${i}€ brutto verdienst, bleiben ca. ${netto}€ netto übrig (geschätzt).</p>

<h2>${i}€ brutto in netto</h2>
<p>Durchschnittlich ca. 30% Abzüge.</p>

<a href="index.html">Zum Rechner</a>

</body>
</html>`;

        let blob = new Blob([content], { type: "text/html" });
        let link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = `netto-${i}-brutto.html`;

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
</script>
