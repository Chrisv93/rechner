<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiten Generator</title>

<style>
body {
 font-family: Arial, sans-serif;
 background:#f4f6f9;
 margin:0;
 padding:40px;
 text-align:center;
}
button {
 padding:15px 25px;
 font-size:18px;
 border:none;
 border-radius:8px;
 background:#2c7be5;
 color:white;
 cursor:pointer;
}
</style>

</head>

<body>

<h1>Seiten Generator</h1>
<button onclick="generate()">Seiten erstellen</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

// Netto
function netto(b){
 if(b<=2000)return Math.round(b*0.74/50)*50;
 if(b<=3000)return Math.round(b*0.72/50)*50;
 if(b<=4000)return Math.round(b*0.70/50)*50;
 if(b<=5000)return Math.round(b*0.68/50)*50;
 if(b<=7000)return Math.round(b*0.66/50)*50;
 return Math.round(b*0.64/50)*50;
}

// Layout
function layout(title, content){
 return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${title}</title>
<meta name="description" content="Berechne dein Netto Gehalt und entdecke Einsparpotenziale.">

<meta name="robots" content="index, follow">
<meta name="author" content="Christian Voit">
<meta name="language" content="de">

<style>
body {font-family:Arial;background:#f4f6f9;margin:0;}
.wrapper {max-width:960px;margin:40px auto;padding:0 20px;}
.card {
 background:#fff;border-radius:14px;padding:30px;
 box-shadow:0 6px 24px rgba(0,0,0,0.06);
}
h1{text-align:center;}
.result{text-align:center;font-size:26px;font-weight:bold;margin:20px 0;}
.text{text-align:center;color:#4b5563;}

.cta{
 background:#eef4ff;
 padding:25px;
 border-radius:12px;
 text-align:center;
 margin:30px 0;
 border:1px solid #d8e5ff;
}

.button{
 display:inline-block;
 padding:16px 26px;
 background:#16a34a;
 color:#fff;
 text-decoration:none;
 border-radius:10px;
 font-weight:bold;
 font-size:18px;
 margin-top:12px;
}

.section{margin-top:30px;}
.section h2{text-align:center;}

ul{
 margin: 0 auto;
 padding-left: 0;
 list-style-position: inside;
 text-align: center;
 line-height: 2;
}
</style>

</head>

<body>

<div class="wrapper">
<div class="card">

${content}

</div>
</div>

</body>
</html>`;
}

// NETTO PAGE
function nettoPage(v){

 let n = netto(v);

 let links = [v-300,v-200,v-100,v+100,v+200,v+300]
  .filter(x=>x>=1000 && x<=10000)
  .map(x=>`<li><a href="netto-${x}-brutto.html">${x}€ brutto</a></li>`)
  .join("");

 let content = `
<h1>${v}€ brutto → netto</h1>

<div class="result">≈ ${n}€ netto</div>

<div class="cta">
<h2>Du verlierst wahrscheinlich Geld</h2>
<p class="text">
Viele mit ${v}€ brutto sparen <strong>200€ – 500€ pro Jahr</strong>.
</p>

<a href="https://www.check24.de" target="_blank" class="button">
Bis zu 500€ sparen → jetzt prüfen
</a>
</div>

<p class="text">
Bei ${v}€ brutto bleiben dir ca. ${n}€ netto.
</p>

<div class="section">
<h2>Ähnliche Gehälter</h2>
<ul>${links}</ul>
</div>

<div style="text-align:center;margin-top:30px;">
<a href="index.html">Startseite</a> |
<a href="geld-sparen.html">Geld sparen</a> |
<a href="ratgeber-netto.html">Ratgeber</a>
</div>

<p style="text-align:center;margin-top:20px;">
<a href="index.html">Zurück</a>
</p>
`;

 return layout(`${v}€ brutto netto`, content);
}

// GENERATOR
function generate(){

 let zip = new JSZip();

 for(let v=1000; v<=10000; v+=100){
  zip.file(`netto-${v}-brutto.html`, nettoPage(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="seiten.zip";
  a.click();
 });

}

</script>

</body>
</html>
