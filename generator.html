
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiten Generator</title>

<style>
body {
 font-family: Arial;
 background:#f4f6f9;
 margin:0;
 padding:40px;
 text-align:center;
}
button {
 padding:15px 25px;
 font-size:18px;
 border:none;
 border-radius:8px;
 background:#2c7be5;
 color:white;
 cursor:pointer;
}
</style>

</head>

<body>

<h1>Seiten Generator</h1>
<button onclick="generate()">Seiten erstellen</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

// Stundenlohn Seite
function stundenPage(v){

 let s = (v / 173).toFixed(2);

 let links = [v-500,v-400,v-300,v-200,v-100,v+100,v+200,v+300,v+400,v+500]
  .filter(x => x>=1000 && x<=10000)
  .map(x => `<li><a href="stundenlohn-${x}.html">${x}€ Stundenlohn</a></li>`)
  .join("");

 return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${v}€ Gehalt → Stundenlohn</title>

<style>
body {font-family: Arial; background:#f4f6f9; margin:0;}
.container {
 max-width:900px; margin:40px auto; background:white; padding:30px;
 border-radius:14px; box-shadow:0 6px 24px rgba(0,0,0,0.06);
}
h1{text-align:center;}
.result{text-align:center;font-size:26px;font-weight:bold;margin:20px 0;}
.text{text-align:center;color:#4b5563;}
.cta{
 background:#eef4ff;padding:25px;border-radius:12px;text-align:center;
 margin:30px 0;border:1px solid #d8e5ff;
}
.button{
 display:inline-block;padding:14px 22px;background:#2c7be5;color:#fff;
 text-decoration:none;border-radius:8px;font-weight:bold;margin-top:10px;
}
.section{margin-top:30px;}
.section h2{text-align:center;}
ul{line-height:1.9;}
</style>

</head>

<body>

<div class="container">

<h1>${v}€ Gehalt → Stundenlohn</h1>

<div class="result">≈ ${s}€ pro Stunde</div>

<p class="text">
Bei ${v}€ entspricht das ungefähr ${s}€ pro Stunde (40h/Woche).
</p>

<div class="cta">
<h2>Mehr Netto behalten</h2>
<p>Vergleiche Strom, Versicherungen oder Konto.</p>

<a href="https://www.check24.de" target="_blank" class="button">
Jetzt kostenlos vergleichen
</a>
</div>

<div class="section">
<h2>Ähnliche Stundenlöhne</h2>

<ul>
${links}
</ul>
</div>

<p style="text-align:center;margin-top:25px;">
<a href="index.html">Zurück</a>
</p>

</div>

</body>
</html>`;
}

// GENERATOR
function generate(){
 let zip = new JSZip();

 for(let v=1000; v<=10000; v+=100){
  zip.file(`stundenlohn-${v}.html`, stundenPage(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="stundenlohn.zip";
  a.click();
 });
}

</script>

</body>
</html>
