<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netto Seiten Generator</title>
</head>

<body>

<h1>Netto Seiten Generator</h1>

<button onclick="generate()">Seiten generieren (ZIP)</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function calcNetto(b){
  if(b<=2000)return Math.round(b*0.74/50)*50;
  if(b<=3000)return Math.round(b*0.72/50)*50;
  if(b<=4000)return Math.round(b*0.70/50)*50;
  if(b<=5000)return Math.round(b*0.68/50)*50;
  if(b<=7000)return Math.round(b*0.66/50)*50;
  return Math.round(b*0.64/50)*50;
}

function links(v){
  let out="";
  for(let i=v-300;i<=v+300;i+=100){
    if(i>=1000 && i<=10000 && i!==v){
      out+=`<li><a href="netto-${i}-brutto.html">${i}€ brutto</a></li>`;
    }
  }
  return out;
}

function page(v){
  let n=calcNetto(v);

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netto bei ${v}€ brutto</title>
<meta name="description" content="Netto bei ${v}€ brutto berechnen und vergleichen.">
<style>
body{font-family:Arial;max-width:800px;margin:0 auto;padding:20px;}
.cta{background:#eef6ff;padding:20px;border-radius:10px;margin:20px 0;}
.button{display:inline-block;padding:12px 18px;background:#0a58ca;color:#fff;text-decoration:none;border-radius:6px;}
</style>
</head>

<body>

<h1>Netto bei ${v}€ brutto</h1>

<div class="cta">
<strong>Mehr Netto behalten?</strong><br>
Vergleiche jetzt deine Fixkosten und spare Geld.
<br><br>
<a class="button" href="https://www.check24.de/" target="_blank">
Jetzt vergleichen
</a>
</div>

<p><strong>${n}€ netto</strong></p>

<p>Bei ${v}€ brutto bleiben ca. ${n}€ netto übrig.</p>

<h2>Ähnliche Gehälter</h2>
<ul>
${links(v)}
</ul>

<div class="cta">
<strong>Jetzt Geld sparen</strong><br>
<a class="button" href="https://www.check24.de/" target="_blank">
Jetzt vergleichen
</a>
</div>

<p><a href="index.html">Zurück zum Rechner</a></p>

</body>
</html>`;
}

function generate(){
  let zip=new JSZip();

  for(let v=1000;v<=10000;v+=100){
    zip.file("netto-"+v+"-brutto.html",page(v));
  }

  zip.generateAsync({type:"blob"}).then(function(content){
    let a=document.createElement("a");
    a.href=URL.createObjectURL(content);
    a.download="netto-seiten.zip";
    a.click();
  });
}
</script>

</body>
</html>
