<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mass SEO Generator</title>
</head>

<body>

<h1>Mass SEO Generator (1000+ Seiten)</h1>

<button onclick="generate()">Alle Seiten generieren</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function netto(b){
 if(b<=2000)return Math.round(b*0.74/50)*50;
 if(b<=3000)return Math.round(b*0.72/50)*50;
 if(b<=4000)return Math.round(b*0.70/50)*50;
 if(b<=5000)return Math.round(b*0.68/50)*50;
 if(b<=7000)return Math.round(b*0.66/50)*50;
 return Math.round(b*0.64/50)*50;
}

function links(v,type){
 let l="";
 for(let i=v-500;i<=v+500;i+=100){
  if(i>=1000 && i<=10000 && i!==v){
   l+=`<li><a href="${type}-${i}.html">${i}€ ${type}</a></li>`;
  }
 }
 return l;
}

function pageNetto(v){
 let n=netto(v);

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${v}€ brutto → netto 2026 – Rechner & Vergleich</title>
<meta name="description" content="Wie viel Netto bleibt bei ${v}€ brutto? Jetzt berechnen.">

<style>
body{font-family:Arial;max-width:800px;margin:0 auto;padding:20px;}
.cta{background:#eef6ff;padding:20px;border-radius:10px;margin:20px 0;}
.button{display:inline-block;padding:12px;background:#0a58ca;color:#fff;text-decoration:none;border-radius:6px;}
</style>

</head>
<body>

<h1>${v}€ brutto → netto</h1>

<div class="cta">
<strong>Mehr Netto behalten</strong><br>
<a class="button" href="https://www.check24.de/" target="_blank">Jetzt vergleichen</a>
</div>

<p><strong>≈ ${n}€ netto</strong></p>

<p>Bei ${v}€ brutto bleiben ca. ${n}€ netto.</p>

<h2>Ähnliche Gehälter</h2>
<ul>${links(v,"netto")}</ul>

<p><a href="index.html">Zurück</a></p>

</body>
</html>`;
}

function pageStunden(v){
 let nettoVal=netto(v);
 let stunden=Math.round(nettoVal/160);

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${v}€ Gehalt → Stundenlohn ${stunden}€</title>
<meta name="description" content="Stundenlohn bei ${v}€ Gehalt berechnen.">

</head>
<body>

<h1>${v}€ Gehalt → ${stunden}€ Stundenlohn</h1>

<div class="cta">
<a class="button" href="https://www.check24.de/" target="_blank">Jetzt vergleichen</a>
</div>

<p>Bei ${v}€ Gehalt entspricht das ca. ${stunden}€ pro Stunde.</p>

<ul>${links(v,"stundenlohn")}</ul>

<p><a href="index.html">Zurück</a></p>

</body>
</html>`;
}

function generate(){
 let zip=new JSZip();

 for(let v=1000;v<=10000;v+=50){
  zip.file(`netto-${v}-brutto.html`,pageNetto(v));
  zip.file(`stundenlohn-${v}.html`,pageStunden(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="mass-seiten.zip";
  a.click();
 });
}
</script>

</body>
</html>
