<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Generator – Geld Seiten</title>
</head>

<body>

<h1>SEO Generator – Geld Keywords</h1>
<p>Erstellt automatisch neue SEO Seiten mit hoher Suchintention.</p>

<button onclick="generate()">Seiten generieren</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const keywords = [
"wie viel netto bei 2000 brutto",
"wie viel netto bei 2500 brutto",
"wie viel netto bei 3000 brutto",
"wie viel netto bei 3500 brutto",
"wie viel netto bei 4000 brutto",
"wie viel netto bei 4500 brutto",
"wie viel netto bei 5000 brutto"
];

function page(k){
 return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${k}</title>
<meta name="description" content="${k} einfach berechnen.">

<style>
body{font-family:Arial;margin:0;background:#f9f9f9}
.container{max-width:800px;margin:0 auto;padding:20px;background:#fff}
h1{text-align:center}
.button{display:inline-block;margin-top:12px;padding:14px 24px;background:#0b57d0;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold}
</style>

</head>

<body>
<div class="container">

<h1>${k}</h1>

<p>Hier kannst du schnell berechnen, wie viel netto du bei deinem Bruttogehalt erhältst.</p>

<a href="https://chrisv93.github.io/rechner/" class="button">Jetzt Rechner nutzen</a>

</div>
</body>
</html>`;
}

function generate(){
 let zip=new JSZip();

 keywords.forEach((k,i)=>{
  zip.file(`frage-${i}.html`,page(k));
 });

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="seo-fragen.zip";
  a.click();
 });
}
</script>

</body>
</html>
