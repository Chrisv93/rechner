<script>
function generate() {
    for(let i = 1000; i <= 6000; i += 100) {
        let netto = (i * 0.7).toFixed(0);

        let content = `
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Netto bei ${i} Brutto</title>
</head>
<body>

<h1>Netto bei ${i}€ Brutto</h1>
<h2>${netto}€ netto</h2>
<a href="index.html">Zum Rechner</a>

</body>
</html>
`;

        let blob = new Blob([content], {type: "text/html"});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `netto-${i}-brutto.html`;
        a.click();
    }
}
</script>
