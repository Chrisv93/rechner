
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiten Generator</title>

<style>
body {
 font-family: Arial, sans-serif;
 background:#f4f6f9;
 margin:0;
 padding:40px;
 text-align:center;
}

button {
 padding:15px 25px;
 font-size:18px;
 border:none;
 border-radius:8px;
 background:#2c7be5;
 color:white;
 cursor:pointer;
}
</style>

</head>

<body>

<h1>Seiten Generator</h1>
<button onclick="generate()">Seiten erstellen</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function netto(b){
 if(b<=2000)return Math.round(b*0.74/50)*50;
 if(b<=3000)return Math.round(b*0.72/50)*50;
 if(b<=4000)return Math.round(b*0.70/50)*50;
 if(b<=5000)return Math.round(b*0.68/50)*50;
 if(b<=7000)return Math.round(b*0.66/50)*50;
 return Math.round(b*0.64/50)*50;
}

function links(v){
 let l="";
 for(let i=v-300;i<=v+300;i+=100){
  if(i>=1000 && i<=10000 && i!==v){
   l+=`<li><a href="netto-${i}-brutto.html">${i}€ brutto → netto</a></li>`;
  }
 }
 return l;
}

function page(v){
 let n = netto(v);

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${v}€ brutto → netto Rechner 2026</title>
<meta name="description" content="Berechne dein Netto bei ${v}€ brutto und optimiere deine monatlichen Kosten.">

<style>
body {
 font-family: Arial;
 background:#f4f6f9;
 margin:0;
}

.container {
 max-width:800px;
 margin:40px auto;
 background:white;
 padding:30px;
 border-radius:12px;
 box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h1 {
 text-align:center;
}

.result {
 text-align:center;
 font-size:24px;
 font-weight:bold;
 margin:20px 0;
}

.cta {
 background:#eef4ff;
 padding:25px;
 border-radius:10px;
 text-align:center;
 margin:30px 0;
}

.button {
 display:inline-block;
 padding:14px 22px;
 background:#2c7be5;
 color:#fff;
 text-decoration:none;
 border-radius:8px;
 font-weight:bold;
 margin-top:10px;
}

ul {
 margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>${v}€ brutto in netto – Rechner 2026</h1>

<div class="result">≈ ${n}€ netto</div>

<p style="text-align:center;">
Bei ${v}€ brutto bleiben dir ungefähr ${n}€ netto. Viele Menschen sparen zusätzlich mehrere hundert Euro pro Monat durch den Vergleich ihrer Fixkosten.
</p>

<!-- 🔥 MONEY CTA -->
<div class="cta">

<h2>Mehr Netto behalten</h2>

<p><strong>Spare bis zu 300€ monatlich</strong> durch den Vergleich von Strom, Konto und Versicherungen.</p>

<a href="https://www.check24.de" target="_blank" class="button">
Jetzt Einsparpotenzial prüfen
</a>

</div>

<h2>Ähnliche Gehälter</h2>

<ul>
${links(v)}
</ul>

<p style="text-align:center;margin-top:20px;">
<a href="index.html">Zurück zur Übersicht</a>
</p>

</div>

</body>
</html>`;
}

function generate(){
 let zip=new JSZip();

 for(let v=1000;v<=10000;v+=100){
  zip.file(`netto-${v}-brutto.html`,page(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="seiten-money.zip";
  a.click();
 });
}
</script>

</body>
</html>
