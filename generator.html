<script>
function generate() {
    for(let i = 1000; i <= 10000; i += 50) {
        let netto = Math.round(i * 0.7);

        let content = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Netto bei ${i} Brutto Deutschland</title>
</head>
<body>

<h1>Netto bei ${i}€ Brutto in Deutschland</h1>

<p>Wenn du ${i} Euro brutto verdienst, liegt dein geschätztes Nettogehalt bei etwa ${netto} Euro pro Monat. Die genaue Höhe hängt von Steuerklasse, Krankenversicherung und Bundesland ab.</p>

<h2>${i}€ brutto in netto</h2>
<p>Bei durchschnittlichen Abzügen von ca. 30% ergibt sich ein Netto von rund ${netto}€.</p>

<h2>Was beeinflusst dein Netto?</h2>
<p>Steuerklasse, Kirchensteuer, Krankenversicherung und Bundesland haben Einfluss auf dein tatsächliches Nettogehalt.</p>

<a href="index.html">Zum Brutto Netto Rechner</a>

</body>
</html>`;

        let blob = new Blob([content], { type: "text/html" });
        let link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = `netto-${i}-brutto.html`;

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
</script>
