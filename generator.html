<!DOCTYPE html>
<html>
<body>

<h1>ZIP Generator</h1>
<button onclick="generate()">Download ZIP</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>
function generate() {
    let zip = new JSZip();

    for(let i = 1000; i <= 10000; i += 50) {
        let netto = Math.round(i * 0.7);

        let content = "<html><body><h1>Netto bei " + i + "€ Brutto</h1><h2>" + netto + "€ netto</h2></body></html>";

        zip.file("netto-" + i + "-brutto.html", content);
    }

    zip.generateAsync({type:"blob"}).then(function(content) {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "seiten.zip";
        a.click();
    });
}
</script>

</body>
</html>
