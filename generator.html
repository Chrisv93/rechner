<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fragen Generator</title>
</head>

<body>

<button onclick="generate()">Frage Seiten erstellen</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let werte = [2000,2500,3000,3500,4000,4500];

function fragePage(v){

 return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wie viel netto bei ${v} brutto?</title>

<style>
body {
 font-family: Arial;
 background:#f4f6f9;
 margin:0;
}

.wrapper {
 max-width:960px;
 margin:40px auto;
 padding:20px;
}

.card {
 background:#fff;
 padding:30px;
 border-radius:14px;
 box-shadow:0 6px 24px rgba(0,0,0,0.06);
 text-align:center;
}

.button {
 display:inline-block;
 margin-top:20px;
 padding:14px 22px;
 background:#2c7be5;
 color:#fff;
 text-decoration:none;
 border-radius:8px;
 font-weight:bold;
}
</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>Wie viel netto bei ${v} brutto?</h1>

<p>
Hier kannst du schnell berechnen, wie viel netto du bei deinem Bruttogehalt erhältst.
</p>

<a href="netto-${v}-brutto.html" class="button">
Jetzt Rechner nutzen
</a>

</div>
</div>

</body>
</html>`;
}

function generate(){

 let zip = new JSZip();

 werte.forEach((v, i) => {
  zip.file(`frage-${i}.html`, fragePage(v));
 });

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="fragen.zip";
  a.click();
 });

}

</script>

</body>
</html>
