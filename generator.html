<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Generator</title>
</head>
<body>

<h1>Generator</h1>
<button onclick="generate()">Generate</button>

<script>
function generate() {
    alert("Start");

    for(let i = 1000; i <= 3000; i += 100) {
        let netto = Math.round(i * 0.7);

        let content = "<html><body><h1>Netto bei " + i + "€ Brutto</h1><h2>" + netto + "€ netto</h2></body></html>";

        let blob = new Blob([content], {type: "text/html"});
        let link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = "netto-" + i + "-brutto.html";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
</script>

</body>
</html>
