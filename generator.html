<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Generator</title>
</head>

<body>

<h1>Fix Generator (keine 404 mehr)</h1>

<button onclick="generate()">Seiten neu generieren</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function netto(b){
 if(b<=2000)return Math.round(b*0.74/50)*50;
 if(b<=3000)return Math.round(b*0.72/50)*50;
 if(b<=4000)return Math.round(b*0.70/50)*50;
 if(b<=5000)return Math.round(b*0.68/50)*50;
 if(b<=7000)return Math.round(b*0.66/50)*50;
 return Math.round(b*0.64/50)*50;
}

function links(v){
 let l="";
 for(let i=v-300;i<=v+300;i+=100){
  if(i>=1000 && i<=10000 && i!==v){
   l+=`<li><a href="netto-${i}-brutto.html">${i}€ brutto → netto</a></li>`;
  }
 }
 return l;
}

function page(v){
 let n=netto(v);

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${v}€ brutto → netto 2026</title>
<meta name="description" content="Netto bei ${v}€ brutto berechnen.">

</head>

<body>

<h1>Netto bei ${v}€ brutto – Rechner 2026</h1>

<p><strong>≈ ${n}€ netto</strong></p>

<p>Bei ${v}€ brutto bleiben ca. ${n}€ netto.</p>

<h2>Ähnliche Gehälter</h2>
<ul>
${links(v)}
</ul>

<p><a href="index.html">Zurück</a></p>

</body>
</html>`;
}

function generate(){
 let zip=new JSZip();

 for(let v=1000;v<=10000;v+=100){
  zip.file(`netto-${v}-brutto.html`,page(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="fix-seiten.zip";
  a.click();
 });
}
</script>

</body>
</html>
