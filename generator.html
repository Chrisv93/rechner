<!DOCTYPE html>
<html>
<body>

<h1>Seiten Generator</h1>

<textarea id="output" rows="20" cols="80"></textarea><br>
<button onclick="generate()">Generate</button>

<script>
function generate() {
    let text = "";

    for(let i = 1000; i <= 6000; i += 100) {
        let netto = i * 0.7;

        text += "Filename: netto-" + i + "-brutto.html\n";
        text += "<h1>Netto bei " + i + "€ Brutto</h1>\n";
        text += "<h2>" + netto.toFixed(0) + "€ netto</h2>\n";
        text += "<a href='index.html'>Zum Rechner</a>\n\n";
    }

    document.getElementById("output").value = text;
}
</script>

</body>
</html>
