<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Generator – Netto Seiten</title>
</head>

<body>

<h1>SEO Seiten Generator</h1>
<p>Erstellt automatisch alle Netto-Seiten mit CTA und internen Links.</p>

<button onclick="generate()">Seiten generieren & downloaden</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function netto(b){
 if(b<=2000)return Math.round(b*0.74/50)*50;
 if(b<=3000)return Math.round(b*0.72/50)*50;
 if(b<=4000)return Math.round(b*0.70/50)*50;
 if(b<=5000)return Math.round(b*0.68/50)*50;
 if(b<=7000)return Math.round(b*0.66/50)*50;
 return Math.round(b*0.64/50)*50;
}

function links(v){
 let l="";
 for(let i=v-300;i<=v+300;i+=100){
  if(i>=1000 && i<=10000 && i!==v){
   l+=`<li><a href="netto-${i}-brutto.html">${i}€ brutto → netto</a></li>`;
  }
 }
 return l;
}

function page(v){
 let n=netto(v);

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${v}€ brutto → netto 2026 Rechner</title>
<meta name="description" content="Wie viel netto bleibt bei ${v}€ brutto? Jetzt einfach berechnen.">

</head>

<body>

<h1>${v}€ brutto in netto – Rechner 2026</h1>

<p><strong>Ergebnis: ca. ${n}€ netto</strong></p>

<p>Wenn du ${v}€ brutto verdienst, bleiben dir ungefähr ${n}€ netto übrig. Der genaue Betrag hängt von Steuerklasse, Bundesland und Versicherungen ab.</p>

<h2>Mehr Netto behalten (kostenlos)</h2>

<div style="background:#f5f7fa;padding:20px;border-radius:10px;margin:30px 0;text-align:center;border:1px solid #ddd">

<p>Viele Menschen verschenken jeden Monat Geld bei Strom, Versicherungen oder Konto. Hier kannst du das kostenlos prüfen:</p>

<a href="https://www.check24.de" target="_blank" rel="nofollow sponsored noopener" style="display:inline-block;margin-top:10px;padding:14px 22px;background:#2c7be5;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;">
Jetzt kostenlos vergleichen
</a>

</div>

<h2>Ähnliche Gehälter</h2>
<ul>
${links(v)}
</ul>

<p><a href="index.html">Zurück zur Übersicht</a></p>

</body>
</html>`;
}

function generate(){
 let zip=new JSZip();

 for(let v=1000;v<=10000;v+=100){
  zip.file(`netto-${v}-brutto.html`,page(v));
 }

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="seo-netto-seiten.zip";
  a.click();
 });
}
</script>

</body>
</html>
