<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Money Generator</title>
</head>

<body>

<h1>Auto Money Generator</h1>
<button onclick="generate()">ALLE GELD-SEITEN GENERIEREN</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

const values = [1000,1500,2000,2500,3000,3500,4000,4500,5000];

function page(v){
 let sparen = Math.round(v * 0.15);

 return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wie viel sparen bei ${v}€ Einkommen?</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.container{max-width:600px;margin:40px auto;background:#fff;padding:25px;border-radius:10px;text-align:center}
.button{display:inline-block;margin-top:15px;padding:14px 24px;background:#0b57d0;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold}
</style>

</head>

<body>

<div class="container">

<h1>Wie viel kannst du bei ${v}€ sparen?</h1>

<p>Viele sparen bis zu ${sparen}€ monatlich durch einfache Wechsel.</p>

<p><strong>Jetzt kostenlos prüfen:</strong></p>

<a href="https://www.check24.de/girokonto/" target="_blank" class="button">
Jetzt kostenlos vergleichen
</a>

</div>

</body>
</html>`;
}

function generate(){
 let zip=new JSZip();

 values.forEach(v=>{
  zip.file(`sparen-${v}.html`,page(v));
 });

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="money-pages.zip";
  a.click();
 });
}

</script>

</body>
</html>
