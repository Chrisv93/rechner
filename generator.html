<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Netto Seiten Generator</title>
</head>
<body>

<h1>Netto Seiten Generator</h1>
<button onclick="generate()">Generate ZIP</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>
function generate() {
    let zip = new JSZip();

    for (let i = 1000; i <= 10000; i += 50) {
        let netto = Math.round(i * 0.7);

        let content = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Netto bei ${i} Euro Brutto in Deutschland</title>
<meta name="description" content="Wie viel netto bleiben bei ${i} Euro brutto? Hier findest du eine einfache und schnelle Berechnung für Deutschland.">
</head>
<body>

<h1>Netto bei ${i}€ Brutto</h1>

<p>Wenn du ${i} Euro brutto im Monat verdienst, bleiben dir in Deutschland geschätzt etwa ${netto} Euro netto. Die genaue Höhe hängt von Steuerklasse, Krankenversicherung, Bundesland und weiteren Abzügen ab.</p>

<h2>${i}€ brutto in netto berechnen</h2>
<p>Als grobe Orientierung kannst du bei diesem Beispiel mit rund ${netto} Euro netto rechnen. Für eine exakte Berechnung solltest du immer individuelle Faktoren wie Steuerklasse und Sozialabgaben beachten.</p>

<h2>Welche Faktoren beeinflussen dein Netto?</h2>
<ul>
<li>Steuerklasse</li>
<li>Krankenversicherung</li>
<li>Kinderfreibeträge</li>
<li>Kirchensteuer</li>
<li>Bundesland</li>
</ul>

<h2>Ähnliche Berechnungen</h2>
<ul>
<li><a href="netto-${Math.max(1000, i-100)}-brutto.html">Netto bei ${Math.max(1000, i-100)}€ brutto</a></li>
<li><a href="netto-${i}-brutto.html">Netto bei ${i}€ brutto</a></li>
<li><a href="netto-${Math.min(10000, i+100)}-brutto.html">Netto bei ${Math.min(10000, i+100)}€ brutto</a></li>
<li><a href="index.html">Zum Brutto Netto Rechner</a></li>
</ul>

<h2>Hinweis</h2>
<p>Diese Seite bietet eine vereinfachte Orientierung für Deutschland und ersetzt keine individuelle Steuerberatung.</p>

</body>
</html>`;

        zip.file(`netto-${i}-brutto.html`, content);
    }

    zip.generateAsync({type:"blob"}).then(function(content) {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "netto-seiten-upgrade.zip";
        a.click();
    });
}
</script>

</body>
</html>
