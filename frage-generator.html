<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragen Generator</title>

<style>
body {
 font-family: Arial;
 background:#f4f6f9;
 text-align:center;
 padding:40px;
}
button {
 padding:15px 25px;
 font-size:18px;
 border:none;
 border-radius:8px;
 background:#2c7be5;
 color:#fff;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>Fragen Generator</h1>
<button onclick="generate()">Fragen erstellen</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

function fragePage(v){

return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wie viel netto bei ${v} brutto?</title>

<style>
body {font-family:Arial;background:#f4f6f9;margin:0;}
.wrapper {max-width:900px;margin:40px auto;padding:0 20px;}
.card {
 background:#fff;border-radius:14px;padding:30px;
 box-shadow:0 6px 24px rgba(0,0,0,0.06);
 text-align:center;
}
.button{
 display:inline-block;
 padding:16px 26px;
 background:#2c7be5;
 color:#fff;
 text-decoration:none;
 border-radius:10px;
 font-weight:bold;
 margin-top:20px;
}
</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>Wie viel netto bei ${v} brutto?</h1>

<p>
Berechne dein Netto und entdecke sofort, wie du mehrere hundert Euro pro Jahr sparen kannst.
</p>

<a href="index.html" class="button">
Jetzt Netto berechnen + bis zu 500€ sparen
</a>

</div>
</div>

</body>
</html>`;
}

function generate(){

 let zip = new JSZip();

 let werte = [2000,2500,3000,3500,4000,4500];

 werte.forEach((v,i)=>{
  zip.file(`frage-${i}.html`, fragePage(v));
 });

 zip.generateAsync({type:"blob"}).then(function(content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download="fragen.zip";
  a.click();
 });

}

</script>

</body>
</html>
