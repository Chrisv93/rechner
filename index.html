
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brutto Netto Rechner Deutschland</title>
<meta name="description" content="Berechne dein Netto Gehalt und finde Sparpotenziale.">

<style>
body {
 font-family: Arial, sans-serif;
 background:#f4f6f9;
 margin:0;
}

.wrapper {
 max-width:1100px;
 margin:40px auto;
 padding:20px;
}

.card {
 background:#fff;
 padding:30px;
 border-radius:14px;
 box-shadow:0 6px 24px rgba(0,0,0,0.06);
}

h1 {
 text-align:center;
 margin-bottom:10px;
}

.subtitle {
 text-align:center;
 color:#6b7280;
 margin-bottom:30px;
}

.grid {
 display:grid;
 grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
 gap:20px;
}

.box {
 background:#f9fafb;
 padding:20px;
 border-radius:10px;
 text-align:center;
 transition:0.2s;
}

.box:hover {
 transform:translateY(-3px);
}

.button {
 display:inline-block;
 margin-top:12px;
 padding:10px 16px;
 background:#2c7be5;
 color:#fff;
 text-decoration:none;
 border-radius:6px;
 font-weight:bold;
}

/* Footer */
.footer {
 margin-top:40px;
 text-align:center;
 font-size:14px;
 color:#6b7280;
}

.footer a {
 margin:0 10px;
 color:#6b7280;
 text-decoration:none;
}
</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>Brutto Netto Rechner</h1>
<p class="subtitle">Wähle dein Gehalt und berechne dein Netto</p>

<div class="grid" id="grid"></div>

</div>

<div class="footer">
<a href="impressum.html">Impressum</a>
<a href="datenschutz.html">Datenschutz</a>
<a href="about.html">Über uns</a>
</div>

</div>

<script>

// 🔥 AUTOMATISCHE EINTRÄGE (kein manuelles Arbeiten mehr)
let grid = document.getElementById("grid");

for(let v = 2000; v <= 6000; v += 500){

 let box = document.createElement("div");
 box.className = "box";

 box.innerHTML = `
 <h3>${v}€ brutto</h3>
 <a href="netto-${v}-brutto.html" class="button">
 Jetzt Rechner nutzen
 </a>
 `;

 grid.appendChild(box);
}

</script>

</body>
</html>
