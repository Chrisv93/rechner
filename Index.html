<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brutto Netto Rechner</title>
</head>
<body>

<h1>Brutto Netto Rechner</h1>

<input id="b" type="number" placeholder="3000">
<button onclick="c()">Berechnen</button>

<p id="r"></p>

<script>
function c(){
 let b=document.getElementById("b").value;
 if(!b)return;
 let n;
 if(b<=2000)n=b*0.74;
 else if(b<=3000)n=b*0.72;
 else if(b<=4000)n=b*0.70;
 else if(b<=5000)n=b*0.68;
 else if(b<=7000)n=b*0.66;
 else n=b*0.64;
 n=Math.round(n/50)*50;
 document.getElementById("r").innerText=b+"€ ≈ "+n+"€ netto";
}
</script>

</body>
</html>
