<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netto Seiten Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}
button {
  padding: 12px 18px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>Netto Seiten Generator</h1>

<button onclick="generate()">Seiten generieren (ZIP)</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function calcNetto(brutto){
  if(brutto<=2000) return Math.round(brutto*0.74/50)*50;
  if(brutto<=3000) return Math.round(brutto*0.72/50)*50;
  if(brutto<=4000) return Math.round(brutto*0.70/50)*50;
  if(brutto<=5000) return Math.round(brutto*0.68/50)*50;
  if(brutto<=7000) return Math.round(brutto*0.66/50)*50;
  return Math.round(brutto*0.64/50)*50;
}

function fileName(v){
  return "netto-"+v+"-brutto.html";
}

function page(v){
  let netto = calcNetto(v);

  return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netto bei ${v}€ brutto</title>
<meta name="description" content="Netto bei ${v}€ brutto berechnen.">
</head>
<body>

<h1>Netto bei ${v}€ brutto</h1>

<p><strong>${netto}€ netto</strong></p>

<p>Bei ${v}€ brutto bleiben ca. ${netto}€ netto übrig.</p>

<p>
<a href="index.html">Zurück zum Rechner</a>
</p>

</body>
</html>`;
}

function generate(){
  let zip = new JSZip();

  for(let v=1000; v<=10000; v+=100){
    zip.file(fileName(v), page(v));
  }

  zip.generateAsync({type:"blob"}).then(function(content){
    let a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "netto-seiten.zip";
    a.click();
  });
}
</script>

</body>
</html>
